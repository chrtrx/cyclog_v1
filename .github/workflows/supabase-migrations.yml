name: Supabase Migrations

# Wendet neue SQL-Migrationen automatisch auf das Supabase-Projekt an,
# sobald sie nach main gemerged werden. Läuft nur, wenn sich Dateien
# unter supabase/migrations/ geändert haben. Kann zusätzlich manuell
# über den "Run workflow"-Button im Actions-Tab gestartet werden.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/supabase-migrations.yml'
  workflow_dispatch:

# Verhindert parallele Migrations-Läufe (z.B. bei schnellen Merges).
concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Supabase CLI installieren
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Projekt verknüpfen
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Migrationen anwenden
        run: supabase db push
