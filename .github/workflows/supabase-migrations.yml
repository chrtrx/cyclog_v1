name: Supabase Migrations

# Wendet alle SQL-Migrationen automatisch auf das Supabase-Projekt an,
# sobald sie nach main gemerged werden. Nutzt die Supabase Management API
# (POST .../database/query) — dadurch wird KEIN Datenbank-Passwort benötigt,
# nur ein Access-Token. Läuft nur, wenn sich Migrationen geändert haben,
# und kann zusätzlich manuell über "Run workflow" im Actions-Tab gestartet
# werden.
#
# Alle Migrationen sind idempotent (IF NOT EXISTS), daher ist es unbedenklich,
# dass bei jedem Lauf sämtliche Dateien (001..) erneut ausgeführt werden.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-migrations.yml'
  workflow_dispatch:

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Migrationen anwenden (Management API)
        run: |
          set -uo pipefail

          # Secrets von versehentlichen Leerzeichen/Zeilenumbrüchen befreien
          # (häufig beim Kopieren auf dem Handy).
          ref="$(printf '%s' "${SUPABASE_PROJECT_REF:-}" | tr -d '[:space:]')"
          token="$(printf '%s' "${SUPABASE_ACCESS_TOKEN:-}" | tr -d '[:space:]')"

          if [ -z "$ref" ] || [ -z "$token" ]; then
            echo "::error::Fehlende Secrets. Bitte SUPABASE_ACCESS_TOKEN und SUPABASE_PROJECT_REF anlegen."
            exit 1
          fi

          # Diagnose: Der Projekt-Ref muss exakt 20 Kleinbuchstaben (a-z) sein.
          echo "PROJECT_REF Länge: ${#ref} (erwartet: 20)"
          if printf '%s' "$ref" | grep -qE '^[a-z]{20}$'; then
            echo "PROJECT_REF Format: OK"
          else
            echo "::error::SUPABASE_PROJECT_REF passt nicht zum erwarteten Format (genau 20 Kleinbuchstaben a-z). Bitte im Dashboard unter Settings → General die 'Reference ID' prüfen und das Secret korrigieren."
            exit 1
          fi

          api="https://api.supabase.com/v1/projects/${ref}/database/query"
          fail=0
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "── Wende an: $f"
            jq -Rs '{query: .}' "$f" > payload.json
            code=$(curl -sS -o resp.json -w "%{http_code}" \
              -X POST "$api" \
              -H "Authorization: Bearer ${token}" \
              -H "Content-Type: application/json" \
              --data-binary @payload.json)
            echo "   HTTP $code"
            echo "   Antwort: $(cat resp.json)"
            if [ "$code" -ge 300 ]; then
              echo "::error::$f fehlgeschlagen (HTTP $code)"
              fail=1
            fi
          done

          if [ "$fail" -ne 0 ]; then
            echo "::error::Mindestens eine Migration ist fehlgeschlagen."
            exit 1
          fi
          echo "✓ Alle Migrationen erfolgreich angewendet."
