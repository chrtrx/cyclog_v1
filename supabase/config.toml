# Supabase CLI Konfiguration
# Wird von der GitHub Action (.github/workflows/supabase-migrations.yml) genutzt,
# um Migrationen automatisch beim Merge nach main anzuwenden.
# project_id ist nur ein lokaler Name; die echte Verknüpfung passiert
# über --project-ref (GitHub-Secret SUPABASE_PROJECT_REF).

project_id = "cyclog"

[db]
# Postgres-Hauptversion des Supabase-Projekts. Supabase nutzt aktuell 15.
major_version = 15
